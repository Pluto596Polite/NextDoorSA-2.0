<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - NextDoorSA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="libs/bootstrap-icons/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f4f6f8;
            color: #333;
        }

        /* Navbar */
        .navbar {
            background-color: #3b74f2;
        }
        .navbar-brand {
            font-weight: 700;
            font-size: 1.5rem;
        }

        /* Form Card */
        .auth-card {
            background: white;
            border-radius: 16px;
            border: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            max-width: 500px;
            width: 100%;
            padding: 40px;
            margin: 60px auto;
        }

        /* Inputs */
        .form-label {
            font-weight: 600;
            font-size: 0.85rem;
            color: #495057;
            margin-bottom: 5px;
        }
        .form-control, .input-group-text {
            background-color: #f8f9fa;
            border: 1px solid #f0f0f0;
            padding: 12px 15px;
            font-size: 0.9rem;
            box-shadow: none;
        }
        .form-control {
            border-radius: 10px;
        }
        .input-group > .form-control {
            border-top-left-radius: 0;
            border-bottom-left-radius: 0;
        }
        .input-group > .input-group-text {
            border-top-left-radius: 10px;
            border-bottom-left-radius: 10px;
            color: #8c98a4;
        }
        .form-control:focus {
            background-color: white;
            border-color: #3b74f2;
            box-shadow: 0 0 0 0.2rem rgba(59, 116, 242, 0.1);
            z-index: 0;
        }

        .form-text {
            font-size: 0.75rem;
            color: #8c98a4;
        }

        /* Checkbox */
        .form-check-input {
            margin-top: 0.3rem;
        }
        .form-check-input:checked {
            background-color: #3b74f2;
            border-color: #3b74f2;
        }
        .form-check-label {
            font-size: 0.85rem;
            color: #495057;
        }

        /* Button */
        .btn-primary {
            background-color: #3b74f2;
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-weight: 600;
            font-size: 1rem;
        }
        .btn-primary:hover {
            background-color: #2b5bc7;
        }

        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 20px 0;
            color: #8c98a4;
            font-size: 0.85rem;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #f0f0f0;
        }
        .divider:not(:empty)::before {
            margin-right: .25em;
        }
        .divider:not(:empty)::after {
            margin-left: .25em;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark py-3">
    <div class="container">
        <a class="navbar-brand d-flex align-items-center gap-2" href="#">
            <i class="bi bi-intersect fs-2"></i> NextDoorSA
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
            <ul class="navbar-nav align-items-center gap-4">
                <li class="nav-item"><a class="nav-link text-white fw-medium" href="#">Home</a></li>
                <li class="nav-item"><a class="nav-link text-white fw-medium" href="#">Explore</a></li>
                <li class="nav-item"><a class="nav-link text-white" href="#"><i class="bi bi-list-ul fs-5"></i></a></li>
                <li class="nav-item"><a class="nav-link text-white" href="#"><i class="bi bi-cart2 fs-5"></i></a></li>
                <li class="nav-item"><a class="nav-link text-white" href="#"><i class="bi bi-person fs-5"></i></a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container px-3">
    <div class="auth-card">
        <h3 class="fw-bold mb-1">Create Account</h3>
        <p class="text-muted small mb-4">Fill in your details to get started</p>

        <form>
            <div class="row g-3 mb-3">
                <div class="col-6">
                    <label class="form-label">First Name</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0"><i class="bi bi-person"></i></span>
                        <input type="text" class="form-control border-start-0 ps-0" placeholder="John">
                    </div>
                </div>
                <div class="col-6">
                    <label class="form-label">Last Name</label>
                    <input type="text" class="form-control" placeholder="Doe">
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Email Address</label>
                <div class="input-group">
                    <span class="input-group-text bg-light border-end-0"><i class="bi bi-envelope"></i></span>
                    <input type="email" class="form-control border-start-0 ps-0" placeholder="you@example.com">
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Phone Number</label>
                <div class="input-group">
                    <span class="input-group-text bg-light border-end-0"><i class="bi bi-telephone"></i></span>
                    <input type="tel" class="form-control border-start-0 ps-0" placeholder="+27 123 456 789">
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Password</label>
                <div class="input-group">
                    <span class="input-group-text bg-light border-end-0"><i class="bi bi-lock"></i></span>
                    <input type="password" class="form-control border-start-0 ps-0" placeholder="••••••••">
                </div>
                <div class="form-text mt-2">Must be at least 8 characters</div>
            </div>

            <div class="form-check mb-4 mt-3">
                <input class="form-check-input" type="checkbox" id="termsCheck">
                <label class="form-check-label" for="termsCheck">
                    I agree to the <a href="#" class="text-primary text-decoration-none">Terms of Service</a> and <a href="#" class="text-primary text-decoration-none">Privacy Policy</a>
                </label>
            </div>

            <button type="submit" class="btn btn-primary w-100 mb-3">
                Create Account <i class="bi bi-arrow-right ms-1"></i>
            </button>

            <div class="divider px-4">or</div>

            <div class="text-center mt-3">
                <p class="text-muted small mb-0">Already have an account? <a href="#" class="text-primary text-decoration-none fw-semibold">Sign in</a></p>
            </div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
