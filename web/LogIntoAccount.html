<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - NextDoorSA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="libs/bootstrap-icons/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f4f6f8;
            color: #333;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Navbar */
        .navbar {
            background-color: #3b74f2;
        }
        .navbar-brand {
            font-weight: 700;
            font-size: 1.5rem;
        }

        /* Main Content Wrapper */
        .main-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 15px;
        }

        /* Form Card */
        .auth-card {
            background: white;
            border-radius: 16px;
            border: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            max-width: 450px;
            width: 100%;
            padding: 40px;
            margin-bottom: 20px;
        }

        /* Inputs */
        .form-label {
            font-weight: 600;
            font-size: 0.85rem;
            color: #495057;
            margin-bottom: 5px;
        }
        .form-control, .input-group-text {
            background-color: #f8f9fa;
            border: 1px solid #f0f0f0;
            padding: 12px 15px;
            font-size: 0.9rem;
            box-shadow: none;
        }
        .form-control {
            border-radius: 10px;
        }
        .input-group > .form-control {
            border-top-left-radius: 0;
            border-bottom-left-radius: 0;
        }
        .input-group > .input-group-text {
            border-top-left-radius: 10px;
            border-bottom-left-radius: 10px;
            color: #8c98a4;
        }
        .form-control:focus {
            background-color: white;
            border-color: #3b74f2;
            box-shadow: 0 0 0 0.2rem rgba(59, 116, 242, 0.1);
            z-index: 0;
        }

        /* Checkbox & Links */
        .form-check-input {
            margin-top: 0.2rem;
        }
        .form-check-input:checked {
            background-color: #3b74f2;
            border-color: #3b74f2;
        }
        .form-check-label {
            font-size: 0.85rem;
            color: #495057;
            font-weight: 500;
        }
        .forgot-link {
            font-size: 0.85rem;
            color: #3b74f2;
            text-decoration: none;
            font-weight: 500;
        }
        .forgot-link:hover {
            text-decoration: underline;
        }

        /* Button */
        .btn-primary {
            background-color: #3b74f2;
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-weight: 600;
            font-size: 1rem;
        }
        .btn-primary:hover {
            background-color: #2b5bc7;
        }

        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 25px 0;
            color: #8c98a4;
            font-size: 0.85rem;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #f0f0f0;
        }
        .divider:not(:empty)::before {
            margin-right: .5em;
        }
        .divider:not(:empty)::after {
            margin-left: .5em;
        }

        /* Footer Text */
        .bottom-terms {
            font-size: 0.75rem;
            color: #8c98a4;
            text-align: center;
        }
        .bottom-terms a {
            color: #3b74f2;
            text-decoration: none;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark py-3">
    <div class="container-fluid px-4">
        <a class="navbar-brand d-flex align-items-center gap-2" href="Home.html">
            <i class="bi bi-intersect fs-2"></i> NextDoorSA
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
            <ul class="navbar-nav align-items-center gap-4">
                <li class="nav-item"><a class="nav-link text-white fw-medium" href="Home.html">Home</a></li>
                <li class="nav-item"><a class="nav-link text-white fw-medium" href="ExploreProductsPage.html">Explore</a></li>
                <li class="nav-item"><a class="nav-link text-white fw-medium" href="CreateAListing.html">Create Listing</a></li>
                <li class="nav-item"><a class="nav-link text-white" href="MyListings.html"> My Listings</a></li>
                <li class="nav-item"><a class="nav-link text-white" href="LogIntoAccount.html"><i class="bi bi-shield-lock"></i> Admin</a></li>
                <li class="nav-item"><a class="nav-link text-white" href="ShoppingCart.html"><i class="bi bi-cart2 fs-5"></i> Cart</a></li>
                <li class="nav-item"><a class="nav-link text-white fw-medium active" aria-current="page" href="Checkout.html"><i class="bi bi-bag-check"></i> Checkout</a></li>
                <li class="nav-item"><a class="nav-link text-white" href="Profile.html"><i class="bi bi-person fs-5"></i> Profile</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="main-wrapper">
    <div class="auth-card">
        <h3 class="fw-bold mb-1">Sign In</h3>
        <p class="text-muted small mb-4">Enter your credentials to access your account</p>

        <form>
            <div class="mb-4">
                <label class="form-label">Email Address</label>
                <div class="input-group">
                    <span class="input-group-text bg-light border-end-0"><i class="bi bi-envelope"></i></span>
                    <input type="email" class="form-control border-start-0 ps-0" placeholder="you@example.com">
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Password</label>
                <div class="input-group">
                    <span class="input-group-text bg-light border-end-0"><i class="bi bi-lock"></i></span>
                    <input type="password" class="form-control border-start-0 ps-0" placeholder="••••••••">
                </div>
            </div>

            <div class="d-flex justify-content-between align-items-center mb-4 mt-3">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="rememberCheck">
                    <label class="form-check-label" for="rememberCheck">
                        Remember me
                    </label>
                </div>
                <a href="#" class="forgot-link">Forgot password?</a>
            </div>

            <button type="submit" class="btn btn-primary w-100 mb-2">
                Sign In <i class="bi bi-arrow-right ms-1"></i>
            </button>

            <div class="divider px-4">or</div>

            <div class="text-center mt-2">
                <p class="text-muted small mb-0">Don't have an account? <a href="#" class="text-primary text-decoration-none fw-semibold">Sign up for free</a></p>
            </div>
        </form>
    </div>

    <p class="bottom-terms">
        By signing in, you agree to our <a href="#">Terms</a> and <a href="#">Privacy Policy</a>
    </p>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
